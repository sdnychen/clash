# ========== 代理组 ==========
proxy-groups:
  # 手动选择
  - name: SELECT
    type: select
    proxies:
      - DIRECT
      - AUTO
    include-all-proxies: true

  # 自动选择
  - name: AUTO
    type: url-test
    proxies:
    url: https://www.gstatic.com/generate_204
    include-all-proxies: true
    interval: 300

  # AI
  - name: AI
    type: select
    proxies:
      - SELECT
    include-all-proxies: true

  # Apple
  - name: APPLE
    type: select
    proxies:
      - DIRECT
      - SELECT
    include-all-proxies: true

  # 漏网之鱼
  - name: OTHER
    type: select
    proxies:
      - DIRECT
      - REJECT
      - SELECT
    include-all-proxies: true

